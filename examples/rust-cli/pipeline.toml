# Example: Rust CLI tool
# Covers formatting, linting, testing, and release build

name = "Rust CLI"

[[stages]]
name = "format-check"
commands = ["cargo fmt --check"]
backend = "local"
fail_fast = true

[[stages]]
name = "clippy"
commands = ["cargo clippy -- -D warnings"]
backend = "local"
fail_fast = true

[[stages]]
name = "test"
commands = ["cargo test"]
backend = "local"
fail_fast = true

[[stages]]
name = "build-release"
commands = ["cargo build --release"]
backend = "local"
fail_fast = true
