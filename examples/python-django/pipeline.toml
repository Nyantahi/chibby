# Example: Python Django application
# Covers linting, testing, migrations check, and SSH deploy

name = "Django App"

[[stages]]
name = "lint"
commands = [
  "ruff check .",
  "ruff format --check ."
]
backend = "local"
fail_fast = true

[[stages]]
name = "test"
commands = ["python manage.py test --parallel"]
backend = "local"
fail_fast = true

[[stages]]
name = "check-migrations"
commands = ["python manage.py makemigrations --check --dry-run"]
backend = "local"
fail_fast = true

[[stages]]
name = "collect-static"
commands = ["python manage.py collectstatic --noinput"]
backend = "local"
fail_fast = true

[[stages]]
name = "deploy"
commands = [
  "git pull origin main",
  "pip install -r requirements.txt",
  "python manage.py migrate --noinput",
  "sudo systemctl restart gunicorn"
]
backend = "ssh"
fail_fast = true
