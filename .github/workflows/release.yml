name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    working-directory: chibby

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.id }}
      tag_name: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v6

      - name: Create GitHub Release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Chibby ${{ github.ref_name }}
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true

  build:
    name: Build (${{ matrix.platform }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg
          - platform: macos-x86_64
            os: macos-13
            target: x86_64-apple-darwin
            bundles: dmg
          - platform: linux-x86_64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,rpm,appimage
          - platform: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: chibby/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: chibby/src-tauri

      - name: Install Linux dependencies
        if: contains(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build CLI binary
        run: |
          cd src-tauri
          cargo build --features cli --bin chibby-cli --release --target ${{ matrix.target }}

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: chibby
          tagName: ${{ github.ref_name }}
          releaseName: Chibby ${{ github.ref_name }}
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Copy CLI into macOS app bundle
        if: contains(matrix.platform, 'macos')
        run: |
          APP_PATH=$(find src-tauri/target/${{ matrix.target }}/release/bundle -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            cp src-tauri/target/${{ matrix.target }}/release/chibby-cli "$APP_PATH/Contents/MacOS/"
            chmod +x "$APP_PATH/Contents/MacOS/chibby-cli"
          fi

      - name: Package standalone CLI
        run: |
          mkdir -p cli-dist
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp src-tauri/target/${{ matrix.target }}/release/chibby-cli.exe cli-dist/
            cd cli-dist && zip chibby-cli-${{ matrix.platform }}.zip chibby-cli.exe
          else
            cp src-tauri/target/${{ matrix.target }}/release/chibby-cli cli-dist/
            cd cli-dist && tar -czvf chibby-cli-${{ matrix.platform }}.tar.gz chibby-cli
          fi

      - name: Upload CLI to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            chibby/cli-dist/chibby-cli-*.tar.gz
            chibby/cli-dist/chibby-cli-*.zip

  # Create universal macOS CLI binary
  macos-universal-cli:
    name: macOS Universal CLI
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: chibby/src-tauri

      - name: Build CLI for both architectures
        working-directory: chibby/src-tauri
        run: |
          cargo build --features cli --bin chibby-cli --release --target aarch64-apple-darwin
          cargo build --features cli --bin chibby-cli --release --target x86_64-apple-darwin

      - name: Create universal binary
        working-directory: chibby
        run: |
          mkdir -p cli-dist
          lipo -create \
            src-tauri/target/aarch64-apple-darwin/release/chibby-cli \
            src-tauri/target/x86_64-apple-darwin/release/chibby-cli \
            -output cli-dist/chibby-cli
          chmod +x cli-dist/chibby-cli
          cd cli-dist && tar -czvf chibby-cli-macos-universal.tar.gz chibby-cli

      - name: Upload universal CLI
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: chibby/cli-dist/chibby-cli-macos-universal.tar.gz

  publish-release:
    name: Publish Release
    needs: [create-release, build, macos-universal-cli]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false
            });
