name: Security Scans

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Weekly Monday 06:00 UTC — catches new CVEs in dormant branches.
    - cron: '0 6 * * 1'

# Minimum-permission token scope at the workflow level.
permissions:
  contents: read

jobs:
  # ─── Secret scanning ─────────────────────────────────────────────────────
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # gitleaks needs full history to scan every commit.
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # required for private repos

  # ─── Frontend dependency audit ───────────────────────────────────────────
  frontend-audit:
    name: Frontend dep audit (npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install
        run: npm ci --ignore-scripts
      - name: Audit (fail on high + critical)
        run: npm audit --audit-level=high

  # ─── Rust dependency audit ───────────────────────────────────────────────
  cargo-audit:
    name: Rust dep audit (cargo audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      # Pin cargo-audit to a known-good version. Latest published as of this
      # workflow's last update. `cargo install` from source has been flaking
      # on hosted runners with stale lockfile parsers — pinning keeps the
      # binary stable across runs.
      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.1 --locked
      - name: Audit
        working-directory: src-tauri
        run: cargo audit --file Cargo.lock
