[meta]
name = "Render Deploy (CLI)"
description = "Deploy to Render using the Render CLI"
author = "chibby"
version = "1.0.0"
category = "deployment"
tags = ["render", "cloud", "deploy", "cli"]
required_tools = ["render"]
template_type = "stage"

[[stages]]
name = "render-deploy"
commands = ["render deploys create {{service_id}} --wait"]
backend = "local"
fail_fast = true

[stages.health_check]
command = "curl -sf {{health_url}}"
retries = 5
delay_secs = 10
