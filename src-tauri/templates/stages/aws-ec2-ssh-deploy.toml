[meta]
name = "AWS EC2 Deploy (SSH)"
description = "Deploy to AWS EC2 instances via SSH and rsync"
author = "chibby"
version = "1.0.0"
category = "deployment"
tags = ["aws", "ec2", "ssh", "deploy"]
required_tools = ["rsync", "ssh"]
template_type = "stage"

[[stages]]
name = "ec2-deploy"
commands = [
  "rsync -avz --delete -e 'ssh -i {{ssh_key_path}}' ./dist/ {{ec2_user}}@{{ec2_host}}:{{deploy_path}}/",
  "ssh -i {{ssh_key_path}} {{ec2_user}}@{{ec2_host}} 'sudo systemctl restart {{service_name}}'"
]
backend = "local"
fail_fast = true

[stages.health_check]
command = "curl -sf http://{{ec2_host}}:{{health_port}}/health"
retries = 3
delay_secs = 5
