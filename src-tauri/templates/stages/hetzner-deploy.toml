[meta]
name = "Hetzner Cloud Deploy (SSH)"
description = "Deploy to Hetzner Cloud servers via SSH"
author = "chibby"
version = "1.0.0"
category = "deployment"
tags = ["hetzner", "cloud", "ssh", "deploy"]
required_tools = ["rsync", "ssh"]
template_type = "stage"

[[stages]]
name = "hetzner-deploy"
commands = [
  "rsync -avz --delete ./dist/ {{ssh_user}}@{{server_ip}}:{{deploy_path}}/",
  "ssh {{ssh_user}}@{{server_ip}} 'sudo systemctl restart {{service_name}}'"
]
backend = "local"
fail_fast = true

[stages.health_check]
command = "curl -sf http://{{server_ip}}:{{health_port}}/health"
retries = 3
delay_secs = 5
