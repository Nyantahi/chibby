[meta]
name = "GitHub Release"
description = "Create a GitHub release with auto-generated notes, optionally uploading dist assets"
author = "chibby"
version = "1.0.0"
category = "deployment"
tags = ["github", "release", "publish"]
template_type = "stage"

[[stages]]
name = "github-release"
commands = [
  "V=$(cat VERSION 2>/dev/null || echo \"{{version}}\") && if [ -z \"$V\" ]; then echo 'Error: No VERSION file found and no version variable provided'; exit 1; fi && ASSETS=$(find ./dist -name '*.tar.gz' -o -name '*.zip' 2>/dev/null || true) && if [ -n \"$ASSETS\" ]; then gh release create \"v$V\" --generate-notes --draft $ASSETS; else gh release create \"v$V\" --generate-notes --draft; fi"
]
backend = "local"
fail_fast = true
