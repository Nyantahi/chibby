[meta]
name = "Docker Compose Deploy (SSH)"
description = "Pull and restart Docker Compose services on a remote host with health check"
author = "chibby"
version = "1.0.0"
category = "deployment"
tags = ["docker", "compose", "ssh", "deploy"]
required_tools = ["docker"]
template_type = "stage"

[[stages]]
name = "docker-deploy"
commands = ["docker compose pull", "docker compose up -d"]
backend = "ssh"
fail_fast = true

[stages.health_check]
command = "curl -sf http://localhost:{{health_port}}/health"
retries = 3
delay_secs = 5
