[meta]
name = "Version Bump & Tag"
description = "Bump the npm version, commit, tag, and push to remote"
author = "chibby"
version = "1.0.0"
category = "deployment"
tags = ["version", "tag", "git", "release"]
required_tools = ["npm", "git"]
template_type = "stage"

[[stages]]
name = "version-tag"
commands = [
  "npm version patch --no-git-tag-version || true",
  "git add -A && git commit -m \"chore: bump version\"",
  "git tag \"v$(node -p \"require('./package.json').version\")\"",
  "git push --follow-tags"
]
backend = "local"
fail_fast = true
