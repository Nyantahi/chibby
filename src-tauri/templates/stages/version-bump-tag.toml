[meta]
name = "Version Bump & Tag"
description = "Bump the npm version (patch, minor, or major), commit, tag, and push to remote"
author = "chibby"
version = "1.1.0"
category = "deployment"
tags = ["version", "tag", "git", "release"]
required_tools = ["npm", "git"]
template_type = "stage"

[[stages]]
name = "version-tag"
commands = [
  "npm version {{bump_level}} --no-git-tag-version || true",
  "NEW_VERSION=$(node -p \"require('./package.json').version\")",
  "if [ -f src-tauri/tauri.conf.json ]; then sed -i '' \"s/\\\"version\\\": \\\"[^\\\"]*\\\"/\\\"version\\\": \\\"${NEW_VERSION}\\\"/\" src-tauri/tauri.conf.json; fi",
  "if [ -f src-tauri/Cargo.toml ]; then sed -i '' \"s/^version = \\\"[^\\\"]*\\\"/version = \\\"${NEW_VERSION}\\\"/\" src-tauri/Cargo.toml; fi",
  "git add -A && git commit -m \"chore: bump version\"",
  "git tag \"v${NEW_VERSION}\"",
  "git push --follow-tags"
]
backend = "local"
fail_fast = true
