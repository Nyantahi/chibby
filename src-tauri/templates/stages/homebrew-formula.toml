[meta]
name = "Homebrew Formula Update"
description = "Update a Homebrew formula with the latest version and SHA256"
author = "chibby"
version = "1.0.0"
category = "deployment"
tags = ["homebrew", "macos", "formula", "publish"]
required_tools = ["shasum", "sed"]
template_type = "stage"

[[stages]]
name = "homebrew-publish"
commands = [
  "VERSION=$(cat VERSION || echo \"{{version}}\")",
  "SHA256=$(shasum -a 256 dist/*-macos-universal.tar.gz | cut -d \" \" -f1)",
  "sed -i \"\" \"s/version \\\".*\\\"/version \\\"${VERSION}\\\"/\" {{formula_path}}",
  "sed -i \"\" \"s/sha256 \\\".*\\\"/sha256 \\\"${SHA256}\\\"/\" {{formula_path}}"
]
backend = "local"
fail_fast = true
