[meta]
name = "Homebrew Core PR"
description = "Submit a pull request to homebrew-core or homebrew-cask to update your formula"
author = "chibby"
version = "1.0.0"
category = "deployment"
tags = ["homebrew", "macos", "formula", "homebrew-core", "cask", "pr"]
required_tools = ["brew", "gh"]
template_type = "stage"

[[stages]]
name = "homebrew-core-pr"
commands = [
  "V=$(cat VERSION 2>/dev/null || echo \"{{version}}\") && brew bump-{{formula_type}}-pr --version \"$V\" --url \"{{download_url}}\" --no-browse {{formula_name}}"
]
backend = "local"
fail_fast = true
