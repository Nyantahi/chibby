[meta]
name = "Homebrew Tap Publish"
description = "Update and push a formula in your own Homebrew tap repository"
author = "chibby"
version = "1.0.0"
category = "deployment"
tags = ["homebrew", "macos", "formula", "tap", "publish"]
required_tools = ["git", "shasum"]
template_type = "stage"

[[stages]]
name = "homebrew-tap-publish"
commands = [
  "V=$(cat VERSION 2>/dev/null || echo \"{{version}}\") && TAP_DIR=\"{{tap_repo_path}}\" && FORMULA=\"${TAP_DIR}/{{formula_file}}\" && SHA=$(shasum -a 256 \"{{tarball_path}}\" | cut -d ' ' -f1) && sed -i '' \"s/version \\\".*\\\"/version \\\"$V\\\"/\" \"$FORMULA\" && sed -i '' \"s/sha256 \\\"PLACEHOLDER.*\\\"/sha256 \\\"$SHA\\\"/\" \"$FORMULA\" && cd \"$TAP_DIR\" && git add -A && git commit -m \"Update to v$V\" && git push"
]
backend = "local"
fail_fast = true
