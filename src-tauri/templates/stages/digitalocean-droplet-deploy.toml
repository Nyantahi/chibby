[meta]
name = "DigitalOcean Droplet Deploy (SSH)"
description = "Deploy to DigitalOcean Droplets via SSH"
author = "chibby"
version = "1.0.0"
category = "deployment"
tags = ["digitalocean", "droplet", "ssh", "deploy"]
required_tools = ["rsync", "ssh"]
template_type = "stage"

[[stages]]
name = "droplet-deploy"
commands = [
  "rsync -avz --delete ./dist/ {{droplet_user}}@{{droplet_ip}}:{{deploy_path}}/",
  "ssh {{droplet_user}}@{{droplet_ip}} 'sudo systemctl restart {{service_name}}'"
]
backend = "local"
fail_fast = true

[stages.health_check]
command = "curl -sf http://{{droplet_ip}}:{{health_port}}/health"
retries = 3
delay_secs = 5
