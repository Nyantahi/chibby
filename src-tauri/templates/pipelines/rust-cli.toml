[meta]
name = "Rust CLI"
description = "CI pipeline for Rust command-line tools: formatting, linting, testing, and release build"
author = "chibby"
version = "1.0.0"
category = "rust"
tags = ["rust", "cli", "cargo"]
project_types = ["rust"]
required_tools = ["cargo", "rustfmt", "clippy"]
template_type = "pipeline"

[pipeline]
name = "{{project_name}} Pipeline"

[[pipeline.stages]]
name = "format-check"
commands = ["cargo fmt --check"]
backend = "local"
fail_fast = true

[[pipeline.stages]]
name = "clippy"
commands = ["cargo clippy -- -D warnings"]
backend = "local"
fail_fast = true

[[pipeline.stages]]
name = "test"
commands = ["cargo test"]
backend = "local"
fail_fast = true

[[pipeline.stages]]
name = "build-release"
commands = ["cargo build --release"]
backend = "local"
fail_fast = true
