# Chibby Environment Configuration
#
# Environments define deployment targets and their settings.
# Run with: chibby run --env <environment>

[[environments]]
name = "release"

# Variables available to release stages
[environments.variables]
RELEASE_TYPE = "patch"

# Prerequisites:
# 1. Install GitHub CLI: brew install gh
# 2. Authenticate: gh auth login
# 3. Install cargo-edit: cargo install cargo-edit
# 4. Install changelog tool: npm install -g conventional-changelog-cli
#
# For macOS code signing (optional):
# - APPLE_CERTIFICATE: Base64-encoded .p12 certificate
# - APPLE_CERTIFICATE_PASSWORD: Certificate password
# - APPLE_SIGNING_IDENTITY: "Developer ID Application: Your Name"
# - APPLE_ID: Apple ID email for notarization
# - APPLE_PASSWORD: App-specific password
# - APPLE_TEAM_ID: Apple Developer Team ID
#
# Run: chibby run --env release
# Or with bump type: RELEASE_TYPE=minor chibby run --env release

[[environments]]
name = "homebrew"

# Path to local clone of homebrew-chibby repository
[environments.variables]
HOMEBREW_TAP_PATH = "../homebrew-chibby"

# Prerequisites:
# 1. Clone your homebrew tap: git clone git@github.com:okapian/homebrew-chibby.git ../homebrew-chibby
# 2. Run a release first: chibby run --env release
# 3. Then update homebrew: chibby run --env homebrew
#
# Or set a custom path:
# HOMEBREW_TAP_PATH=~/taps/homebrew-chibby chibby run --env homebrew

[[environments]]
name = "release-full"

# Combines release + homebrew in one run
[environments.variables]
RELEASE_TYPE = "patch"
HOMEBREW_TAP_PATH = "../homebrew-chibby"

# Usage: chibby run --env release-full
# Or: RELEASE_TYPE=minor chibby run --env release-full
